<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Captura EUDR - Registro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #f4f7f6; }
        #map { height: 50vh; width: 100%; }
        #panel { height: 40vh; padding: 15px; text-align: center; }
        input { width: 90%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .btn { padding: 12px; margin: 5px; border: none; background: #ddd; border-radius: 5px; cursor: pointer; }
        .seleccionado { background: #2196F3; color: white; }
        #btn-enviar { width: 90%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="panel">
        <input type="text" id="input-id" placeholder="Cédula o Código de Finca">
        <button id="btn-menos" class="btn">NO (< 4ha)</button>
        <button id="btn-mas" class="btn">SÍ (> 4ha)</button>
        <button id="btn-enviar" disabled>Enviar a Validación</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>
    <script>
        var map = L.map('map').setView([9.928, -84.090], 14);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        
        let geometria = null;
        const btnEnviar = document.getElementById('btn-enviar');

        // Configuración de botones
        document.getElementById('btn-menos').onclick = () => { map.pm.addControls({drawMarker: true, drawPolygon: false}); btnEnviar.disabled = true; };
        document.getElementById('btn-mas').onclick = () => { map.pm.addControls({drawMarker: false, drawPolygon: true}); btnEnviar.disabled = true; };
        
        map.on('pm:create', e => { geometria = e.layer.toGeoJSON(); btnEnviar.disabled = false; });

        btnEnviar.onclick = function() {
            const id = document.getElementById('input-id').value;
            if(!id || !geometria) return alert("Falta cédula o polígono");
            
            fetch('TU_URL_AQUÍ', { 
                method: 'POST', 
                mode: 'no-cors',
                body: JSON.stringify({ identificador: id, geojson: geometria })
            }).then(() => alert("Enviado."));
        };
    </script>
</body>
</html>
