<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Captura EUDR - Registro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #f4f7f6; }
        #map { height: 52vh; width: 100%; }
        #panel { padding: 14px; }
 
        input[type=text] { width: 100%; padding: 11px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
 
        .fila-botones { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn-tam { flex: 1; padding: 11px 6px; border: 2px solid #ccc; background: white; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-tam.seleccionado { border-color: #2196F3; background: #2196F3; color: white; }
 
        .fila-acciones { display: flex; gap: 8px; margin-bottom: 10px; }
        #btn-gps    { flex: 1; padding: 11px; background: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        #btn-borrar { flex: 1; padding: 11px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
 
        #btn-enviar { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 6px; margin-top: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #btn-enviar:disabled { background: #95a5a6; cursor: not-allowed; }
 
        #estado { font-size: 12px; color: #888; text-align: center; margin-top: 6px; min-height: 18px; }
 
        /* Modal resultado */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 9999; align-items: center; justify-content: center; }
        #modal.visible { display: flex; }
        #modal-box { background: white; border-radius: 12px; padding: 28px 24px; max-width: 340px; width: 90%; text-align: center; }
        #semaforo { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 36px; }
        .verde    { background: #27ae60; }
        .amarillo { background: #f39c12; }
        .rojo     { background: #e74c3c; }
        #modal-titulo { font-size: 20px; font-weight: bold; margin: 0 0 8px; }
        #modal-desc   { font-size: 13px; color: #555; margin: 0 0 20px; line-height: 1.5; }
        .btn-descarga { display: block; width: 100%; padding: 11px; margin-bottom: 8px; border-radius: 6px; font-size: 14px; font-weight: 600; text-decoration: none; text-align: center; }
        .btn-pdf     { background: #e74c3c; color: white; }
        .btn-geojson { background: #2ecc71; color: white; }
        #btn-cerrar  { margin-top: 8px; background: none; border: 1px solid #ccc; border-radius: 6px; padding: 9px 24px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
 
<div id="map"></div>
 
<div id="panel">
    <input type="text" id="input-id" placeholder="Cédula o Código de Finca">
 
    <div class="fila-botones">
        <button id="btn-menos" class="btn-tam" onclick="seleccionarTamano('pequeña', this)">
            🔵 Menos de 4 ha<br><small style="font-weight:400">(punto GPS)</small>
        </button>
        <button id="btn-mas" class="btn-tam" onclick="seleccionarTamano('grande', this)">
            🟢 4 ha o más<br><small style="font-weight:400">(dibujar polígono)</small>
        </button>
    </div>
 
    <div class="fila-acciones">
        <button id="btn-gps"    onclick="capturarGPS()">📍 Mi ubicación GPS</button>
        <button id="btn-borrar" onclick="borrarDibujo()">🗑 Borrar</button>
    </div>
 
    <button id="btn-enviar" disabled onclick="enviar()">Enviar a Validación EUDR</button>
    <div id="estado"></div>
</div>
 
<!-- Modal resultado -->
<div id="modal">
    <div id="modal-box">
        <div id="semaforo"></div>
        <p id="modal-titulo"></p>
        <p id="modal-desc"></p>
        <a id="link-pdf"     class="btn-descarga btn-pdf"     href="#" target="_blank">⬇ Descargar Informe PDF</a>
        <a id="link-geojson" class="btn-descarga btn-geojson" href="#" target="_blank">⬇ Descargar GeoJSON Auditoría</a>
        <button id="btn-cerrar" onclick="cerrarModal()">Cerrar</button>
    </div>
</div>
 
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>
<script>
 
// ── CONFIGURACIÓN ─────────────────────────────────────────────
// Desarrollo local en Mac:
const BACKEND_URL    = "http://localhost:8000/analizar";
// Cuando pases a Hetzner, cambia a:
// const BACKEND_URL = "https://tudominio.com/analizar";
 
const COOPERATIVA_ID = "COOP_DEFAULT";
// ──────────────────────────────────────────────────────────────
 
const map = L.map('map').setView([9.928, -84.090], 14);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Esri World Imagery'
}).addTo(map);
 
let geometria    = null;
let tamanoFinca  = null;
let capasActivas = [];
 
function seleccionarTamano(tam, btn) {
    tamanoFinca = tam;
    document.querySelectorAll('.btn-tam').forEach(b => b.classList.remove('seleccionado'));
    btn.classList.add('seleccionado');
    borrarDibujo();
    if (tam === 'grande') {
        map.pm.addControls({ drawPolygon: true, drawMarker: false, drawCircle: false, drawPolyline: false, editMode: true, removalMode: true });
    } else {
        map.pm.addControls({ drawMarker: true, drawPolygon: false, drawCircle: false, drawPolyline: false, editMode: false, removalMode: true });
    }
    setEstado("Dibuja tu finca en el mapa");
}
 
map.on('pm:create', (e) => {
    capasActivas.forEach(c => map.removeLayer(c));
    capasActivas = [e.layer];
    geometria = e.layer.toGeoJSON();
    verificarListo();
    setEstado("Figura capturada ✓");
});
 
function capturarGPS() {
    setEstado("Obteniendo ubicación GPS...");
    if (!navigator.geolocation) return alert("Tu navegador no soporta GPS");
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            map.setView([lat, lng], 17);
            L.circleMarker([lat, lng], { radius: 8, color: '#e74c3c', fillColor: '#e74c3c', fillOpacity: 0.8 })
             .addTo(map).bindPopup(`📍 ${lat.toFixed(6)}, ${lng.toFixed(6)}`).openPopup();
            setEstado(`GPS: ${lat.toFixed(5)}, ${lng.toFixed(5)}`);
        },
        (err) => setEstado("Error GPS: " + err.message),
        { enableHighAccuracy: true, timeout: 10000 }
    );
}
 
function borrarDibujo() {
    capasActivas.forEach(c => map.removeLayer(c));
    capasActivas = [];
    geometria    = null;
    map.pm.disableDraw();
    document.getElementById('btn-enviar').disabled = true;
    setEstado("");
}
 
function verificarListo() {
    const id = document.getElementById('input-id').value.trim();
    document.getElementById('btn-enviar').disabled = !(id && geometria && tamanoFinca);
}
document.getElementById('input-id').addEventListener('input', verificarListo);
 
async function enviar() {
    const id = document.getElementById('input-id').value.trim();
    if (!id || !geometria || !tamanoFinca) return alert("Completa: cédula, tamaño y dibuja el polígono.");
 
    const btn = document.getElementById('btn-enviar');
    btn.disabled = true;
    btn.textContent = "Analizando con WHISP/FAO... ⏳";
    setEstado("Esto puede tardar 1-2 minutos (análisis satelital)");
 
    try {
        const respuesta = await fetch(BACKEND_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                identificador:  id,
                geojson:        geometria,
                cooperativa_id: COOPERATIVA_ID,
                tamano:         tamanoFinca,
            })
        });
 
        if (!respuesta.ok) {
            const err = await respuesta.json().catch(() => ({}));
            throw new Error(err.detail || `Error ${respuesta.status}`);
        }
 
        const datos = await respuesta.json();
        mostrarResultado(datos);
 
    } catch (error) {
        alert("Error: " + error.message);
        setEstado("Error — intenta de nuevo");
    } finally {
        btn.disabled = false;
        btn.textContent = "Enviar a Validación EUDR";
    }
}
 
function mostrarResultado(datos) {
    const semaforo = datos.semaforo || (datos.eudr_cumple ? "VERDE" : "ROJO");
    const colores  = { VERDE: 'verde', AMARILLO: 'amarillo', ROJO: 'rojo' };
    const emojis   = { VERDE: '✅', AMARILLO: '⚠️', ROJO: '❌' };
    const titulos  = { VERDE: 'CUMPLE EUDR', AMARILLO: 'REVISIÓN REQUERIDA', ROJO: 'NO CUMPLE EUDR' };
    const descs    = {
        VERDE:    "No se detectó deforestación posterior al 31/12/2020. Esta finca puede incluirse en exportaciones a la UE.",
        AMARILLO: "Se detectaron indicios menores. Se recomienda revisión adicional antes de exportar.",
        ROJO:     "Se detectó deforestación posterior al 31/12/2020. Esta finca NO cumple el Reglamento UE 2023/1115."
    };
 
    document.getElementById('semaforo').className  = colores[semaforo] || 'rojo';
    document.getElementById('semaforo').textContent = emojis[semaforo]  || '❌';
    document.getElementById('modal-titulo').textContent = titulos[semaforo] || semaforo;
    document.getElementById('modal-desc').textContent   = descs[semaforo]   || '';
 
    if (datos.urls?.pdf)     document.getElementById('link-pdf').href     = datos.urls.pdf;
    if (datos.urls?.geojson) document.getElementById('link-geojson').href = datos.urls.geojson;
 
    document.getElementById('modal').classList.add('visible');
    setEstado("");
}
 
function cerrarModal() {
    document.getElementById('modal').classList.remove('visible');
}
 
function setEstado(msg) {
    document.getElementById('estado').textContent = msg;
}
 
</script>
</body>
</html>
